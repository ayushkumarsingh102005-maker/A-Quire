name: Deploy to AWS

on:
  push:
    branches: [main]

# ── Required GitHub Secrets (Settings → Secrets → Actions) ───────────────────
# AWS_DEPLOY_ACCESS_KEY_ID      — IAM deploy-user key (NOT the app's runtime key)
# AWS_DEPLOY_SECRET_ACCESS_KEY  — IAM deploy-user secret
# AWS_ACCOUNT_ID                — 12-digit AWS account number
# APPRUNNER_SERVICE_ARN         — arn:aws:apprunner:ap-south-1:<id>:service/...
# S3_FRONTEND_BUCKET            — e.g. aquire-frontend
# CLOUDFRONT_DISTRIBUTION_ID    — e.g. E1ABC2DEF3GHI4
# VITE_API_BASE_URL             — https://<apprunner-domain>.ap-south-1.awsapprunner.com
# VITE_COGNITO_USER_POOL_ID
# VITE_COGNITO_CLIENT_ID
# VITE_COGNITO_REGION

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: aquire-backend

jobs:
  # ── Job 1: Build Docker image → push to ECR → trigger App Runner ─────────
  deploy-backend:
    name: Backend → ECR + App Runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ secrets.APPRUNNER_SERVICE_ARN }} \
            --region ${{ env.AWS_REGION }}

  # ── Job 2: Build React → sync to S3 → invalidate CloudFront ─────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ secrets.VITE_COGNITO_REGION }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          # CloudFront API is global but fronted via us-east-1
          aws-region: us-east-1

      - name: Sync assets to S3 (long-cache, immutable)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no-cache so deploys are instant)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
